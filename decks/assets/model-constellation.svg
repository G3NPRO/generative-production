<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A central prompt node connected to four candidate outputs by dashed lines.">
  <defs>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#b5aaff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b7dff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#8b7dff" stroke-linecap="round">
    <line x1="160" y1="135" x2="100" y2="82"  stroke-width="1"   stroke-opacity="0.35" stroke-dasharray="2 4"/>
    <line x1="240" y1="135" x2="310" y2="90"  stroke-width="1"   stroke-opacity="0.35" stroke-dasharray="2 4"/>
    <line x1="165" y1="175" x2="108" y2="240" stroke-width="1"   stroke-opacity="0.35" stroke-dasharray="2 4"/>
    <line x1="235" y1="175" x2="305" y2="230" stroke-width="1"   stroke-opacity="0.35" stroke-dasharray="2 4"/>
  </g>
  <circle cx="200" cy="155" r="64" fill="url(#core)"/>
  <circle cx="200" cy="155" r="44" fill="none" stroke="#b5aaff" stroke-width="1.5"/>
  <circle cx="200" cy="155" r="22" fill="#b5aaff" fill-opacity="0.9"/>
  <g fill="none" stroke="#8b7dff" stroke-width="1.5" stroke-opacity="0.75">
    <circle cx="92"  cy="72"  r="17"/>
    <circle cx="316" cy="80"  r="17"/>
    <circle cx="100" cy="248" r="17"/>
    <circle cx="312" cy="238" r="17"/>
  </g>
  <g fill="#b5aaff" fill-opacity="0.35">
    <circle cx="92"  cy="72"  r="6"/>
    <circle cx="316" cy="80"  r="6"/>
    <circle cx="100" cy="248" r="6"/>
    <circle cx="312" cy="238" r="6"/>
  </g>
</svg>
