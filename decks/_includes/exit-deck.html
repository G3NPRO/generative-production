<script>
  (function () {
    function resolveExitHref() {
      try {
        var ref = document.referrer ? new URL(document.referrer) : null;
        if (ref && ref.origin === location.origin && ref.pathname !== location.pathname) {
          return ref.href;
        }
      } catch (_) {}
      return '../';
    }

    function injectExitButton(toolbar, exitHref) {
      if (toolbar.querySelector('[data-role="deck-exit"]')) return;
      var li = document.createElement('li');
      li.className = 'toolbar-panel-button';
      li.setAttribute('data-role', 'deck-exit');
      li.setAttribute('role', 'button');
      li.setAttribute('tabindex', '0');
      li.setAttribute('aria-label', 'Exit slides and return to the guide');
      li.innerHTML =
        '<span class="deck-exit-icon" aria-hidden="true">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>' +
            '<polyline points="16 17 21 12 16 7"/>' +
            '<line x1="21" y1="12" x2="9" y2="12"/>' +
          '</svg>' +
        '</span>' +
        '<br><span class="slide-menu-toolbar-label">Exit</span>';
      var go = function (e) {
        if (e) e.preventDefault();
        window.location.href = exitHref;
      };
      li.addEventListener('click', go);
      li.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') go(e);
      });
      toolbar.insertBefore(li, toolbar.firstChild);
    }

    function whenReady(selector, cb) {
      var el = document.querySelector(selector);
      if (el) return cb(el);
      var obs = new MutationObserver(function () {
        var found = document.querySelector(selector);
        if (found) { obs.disconnect(); cb(found); }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    }

    var exitHref = resolveExitHref();

    whenReady('.slide-menu-toolbar', function (toolbar) {
      injectExitButton(toolbar, exitHref);
    });

    // Keyboard shortcut: "q" exits the deck.
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'q' || e.metaKey || e.ctrlKey || e.altKey) return;
      var t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      e.preventDefault();
      window.location.href = exitHref;
    });
  })();
</script>
