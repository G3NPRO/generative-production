project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"

website:
  title: "Generative Production"
  description: "A study guide for filmmakers working with generative AI tools."
  site-url: https://generative-production.com
  repo-url: https://github.com/G3NPRO/generative-production
  navbar:
    right:
      - text: Present
        icon: easel
        href: decks/site-deck.html
      - text: Download
        icon: download
        menu:
          - text: PDF (full study guide)
            href: study-guide.pdf
          - text: EPUB (full study guide)
            href: study-guide.epub
          - text: Single-page HTML
            href: study-guide.html
  sidebar:
    style: docked
    collapse-level: 1
    contents:
      - auto: foundations
      - auto: generative-media
      - section: Vibe-coding
        href: vibe-coding/index.md
        contents:
          - text: Foundations
            href: vibe-coding/foundations/index.md
          - text: Platforms
            href: vibe-coding/platforms/index.md
          - text: Setup and Safety
            href: vibe-coding/setup-and-safety/index.md
          - text: Working with Models
            href: vibe-coding/working-with-models/index.md
          - text: Building Software
            href: vibe-coding/building-software/index.md
          - section: Common Traps
            href: vibe-coding/common-traps/index.md
            contents:
              - vibe-coding/common-traps/committing-secrets.md
              - vibe-coding/common-traps/blindly-running-commands.md
              - vibe-coding/common-traps/force-push-disasters.md
              - vibe-coding/common-traps/refactor-without-review.md
              - vibe-coding/common-traps/first-thing-that-compiles.md
              - vibe-coding/common-traps/scope-creep-prompts.md
              - vibe-coding/common-traps/building-on-sand.md
              - vibe-coding/common-traps/runaway-api-bills.md
              - vibe-coding/common-traps/deploy-without-testing.md
              - vibe-coding/common-traps/local-model-demo-trap.md
              - vibe-coding/common-traps/works-on-my-machine.md
      - text: Practical
        href: practical/index.md
      - text: Glossary
        href: glossary.md

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    toc-location: left
    code-copy: true
    include-after-body: _includes/smart-present.html

filters:
  - filters/chapter-bg.lua
