project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"

website:
  title: "Generative Production"
  description: "A study guide for filmmakers working with generative AI tools."
  site-url: https://generative-production.com
  repo-url: https://github.com/G3NPRO/generative-production
  navbar:
    left:
      - text: Foundations
        href: foundations/
      - text: Generative Media
        href: generative-media/
      - text: Vibe-coding
        href: vibe-coding/
      - text: Practical
        href: practical/
      - text: Glossary
        href: glossary.md
    right:
      - text: Present
        icon: easel
        href: decks/
      - text: Download
        icon: download
        menu:
          - text: PDF (full study guide)
            href: study-guide.pdf
          - text: EPUB (full study guide)
            href: study-guide.epub
          - text: Single-page HTML
            href: study-guide.html
  sidebar:
    style: floating
    collapse-level: 2

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    toc-location: left
    code-copy: true

# Duration profiles (`5min`, `15min`, `30min`, `60min`) for decks are activated
# per render via `quarto render --profile Xmin`; no main-config declaration is
# needed (Quarto treats any --profile NAME as valid). A `profile.group` was
# tried and removed because it silently activates the first profile as default,
# which would filter the main render. filters/slide-duration.lua reads
# QUARTO_PROFILE to decide what to elide.
filters:
  - filters/slide-duration.lua
